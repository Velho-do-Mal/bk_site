{% extends 'base.html' %}
{% block title %}Área do Cliente — BK Engenharia{% endblock %}
{% block content %}
<div class="min-h-screen bg-gray-950 flex items-center justify-center pt-20 pb-10">
  <div class="bg-gray-900 border border-gray-800 rounded-3xl p-10 w-full max-w-md shadow-2xl">
    <div class="text-center mb-8">
      <img src="/static/images/logo_icon.jpeg" alt="BK" class="w-16 h-16 rounded-2xl mx-auto mb-4">
      <h1 class="text-2xl font-black text-white">Área do Cliente</h1>
      <p class="text-gray-400 text-sm mt-1">BK Engenharia e Tecnologia</p>
    </div>
    {% if messages %}{% for msg in messages %}<div class="bg-red-500/20 border border-red-500/30 text-red-300 rounded-xl p-3 mb-4 text-sm">{{ msg }}</div>{% endfor %}{% endif %}
    <form method="POST" class="space-y-4">
      {% csrf_token %}
      <div>
        <label class="block text-sm font-semibold text-gray-300 mb-1.5">E-mail</label>
        <input type="email" name="email" required class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 text-white text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="seu@email.com">
      </div>
      <div>
        <label class="block text-sm font-semibold text-gray-300 mb-1.5">Senha</label>
        <input type="password" name="senha" required class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 text-white text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="••••••••">
      </div>
      <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-xl transition-colors">Entrar</button>
    </form>
    <p class="text-center text-gray-500 text-xs mt-6">Não tem acesso? <a href="{% url 'contato:contato' %}" class="text-blue-400 hover:text-blue-300">Entre em contato</a></p>
  </div>
</div>
{% endblock %}
